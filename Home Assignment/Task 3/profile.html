<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            background-color: rgb(238, 243, 244);

        }

        nav {
            margin: auto;
            margin-top: 100px;
            padding: 30px;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.1);
            background-color: white;
            border: 0px solid white;
            border-radius: 10px;
            width: 400px;
            height: 400px;

            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .profile-pic {
            border: 5px solid #6c63ff;
            border-radius: 50%;
            height: 120px;
            width: 120px;
            overflow: hidden;

        }

        h2 {
            margin-top: 15px;
            color: #333;
        }

        .para {
            text-align: center;
            color: gray;
            font-size: 16px;
        }

        hr {
            width: 80%;
            margin: 20px 0;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            width: 100%;
            text-align: center;
        }

        h3{
            margin: 0px;
            padding: 0px;
            color: #6c63ff;
        }

        .sub para{
            margin: 2px 0 0;
            padding: 0px;
        }
    </style>
</head>

<body>
    <nav>
        <div class="profile-pic">
            <img src="pfp dp.jpg" width="100%" height="100%" object-fit="cover">
        </div>
        <h2>Palak Goyal</h2>
        <p class="para">
        Senior Software Architect with a passion for 
        building scalable,high-performance systems and 
        mentoring the next generation.
        </p>
        <hr>
        <div class="stats">
            <div>
                <h3>12+</h3>
                <p class="sub para">YEARS XP</p>
            </div>
            <div>
                <h3>45</h3>
                <p class="sub para">PROJECTS</p>
            </div>
            <div>
                <h3>3.2k</h3>
                <p class="sub para">STARS</p>
            </div>
        </div>
    </nav>
</body>

</html>
